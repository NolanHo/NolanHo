name: Generate Stats Cards

on:
  schedule:
    # 每 24 小时运行一次（UTC 00:00 = 北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 1. 下载 yourinsights stats 卡片
      - name: Fetch yourinsights SVG
        run: |
          mkdir -p stats
          URL="https://yourinsights.vercel.app/api/insight?username=NolanHo&theme=radical&graph=true&languages=true&streak=true&stats=true&header=true&summary=true&profile=true"

          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            curl -sL -o stats/insight.svg "$URL" --max-time 60
            if head -c 4 stats/insight.svg | grep -q "<svg"; then
              echo "✅ SVG downloaded successfully"
              break
            fi
            echo "❌ Not a valid SVG, retrying in 10s..."
            rm -f stats/insight.svg
            sleep 10
          done

          if [ ! -f stats/insight.svg ]; then
            echo "❌ All retries failed, keeping existing SVG"
            exit 0
          fi

      # 2. 生成贪吃蛇贡献图动画
      - name: Generate snake animation
        uses: Platane/snk@v3.5.0
        with:
          github_user_name: NolanHo
          outputs: |
            stats/snake-light.svg?palette=github-light

      # 3. 生成 3D 立体贡献图
      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          USERNAME: NolanHo

      # 4. 提交所有变更
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update stats card, snake & 3d contrib"
          git push
