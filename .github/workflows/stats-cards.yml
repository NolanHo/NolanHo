name: Generate Stats Cards

on:
  schedule:
    # 每天 UTC 00:00 运行一次（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@v0.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          USERNAME: NolanHo
          THEME: radical

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: update stats cards"
          git push
